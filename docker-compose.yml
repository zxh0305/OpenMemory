services:
  mem0_store:
    image: qdrant/qdrant:latest
    container_name: openmemory-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./mem0_storage:/qdrant/storage
    # 移除健康检查，Qdrant 镜像可能没有 wget/curl/bash
    # 使用 service_started 依赖而不是 service_healthy

  openmemory-api:
    build:
      context: api/
      dockerfile: Dockerfile
    image: mem0/openmemory-mcp:latest
    container_name: openmemory-api
    restart: unless-stopped
    env_file:
      - api/.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./openmemory.db}
      - USER=${USER:-default_user}
      - CREATE_DEFAULT_USER=${CREATE_DEFAULT_USER:-false}
      - QDRANT_HOST=mem0_store
      - QDRANT_PORT=6333
    depends_on:
      mem0_store:
        condition: service_started
    ports:
      - "8765:8765"
    volumes:
      - ./api:/usr/src/openmemory
      - ./api/openmemory.db:/usr/src/openmemory/openmemory.db
    command: >
      sh -c "pip install -q APScheduler tzlocal && uvicorn main:app --host 0.0.0.0 --port 8765 --reload --workers 4"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  openmemory-ui:
    build:
      context: ui/
      dockerfile: Dockerfile
    image: mem0/openmemory-ui:latest
    container_name: openmemory-ui
    restart: unless-stopped
    env_file:
      - ui/.env
    environment:
      - PORT=4000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8765}
      - NEXT_PUBLIC_USER_ID=${NEXT_PUBLIC_USER_ID:-${USER:-default_user}}
    depends_on:
      openmemory-api:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mem0_storage:

